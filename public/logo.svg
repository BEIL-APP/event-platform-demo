<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Rounded Square -->
  <rect width="120" height="120" rx="24" fill="#2563EB"/>
  
  <!-- QR-inspired Icon -->
  <g transform="translate(20, 20) scale(3.33)">
    <!-- QR Corner Pattern - Top Left -->
    <rect x="2" y="2" width="8" height="8" rx="1.5" fill="white" />
    <rect x="4" y="4" width="4" height="4" rx="0.5" fill="#2563EB" opacity="0.2" />
    <rect x="5" y="5" width="2" height="2" rx="0.2" fill="white" />
    
    <!-- QR Corner Pattern - Top Right -->
    <rect x="14" y="2" width="8" height="8" rx="1.5" fill="white" />
    <rect x="17" y="5" width="2" height="2" rx="0.2" fill="white" />
    
    <!-- QR Corner Pattern - Bottom Left -->
    <rect x="2" y="14" width="8" height="8" rx="1.5" fill="white" />
    <rect x="5" y="17" width="2" height="2" rx="0.2" fill="white" />
    
    <!-- Data Pixels & Liner Connection -->
    <rect x="14" y="14" width="3" height="3" rx="0.5" fill="white" />
    <rect x="19" y="14" width="3" height="3" rx="0.5" fill="white" />
    <rect x="14" y="19" width="3" height="3" rx="0.5" fill="white" />
    <rect x="18" y="18" width="4" height="4" rx="1" fill="white" opacity="0.6" />
    
    <!-- Subtle connection line between parts -->
    <rect x="11" y="4" width="2" height="1" rx="0.5" fill="white" opacity="0.4" />
    <rect x="11" y="19" width="2" height="1" rx="0.5" fill="white" opacity="0.4" />
    <rect x="4" y="11" width="1" height="2" rx="0.5" fill="white" opacity="0.4" />
    <rect x="19" y="11" width="1" height="2" rx="0.5" fill="white" opacity="0.4" />
  </g>
</svg>
